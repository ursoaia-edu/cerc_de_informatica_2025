<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="monospace" font-size="11">
  <rect width="100%" height="100%" fill="#d0d0d0"/>
  <style>
    .wire { stroke: #222; stroke-width: 1.5; fill: none; }
    .comp { stroke: #222; stroke-width: 1.5; fill: none; }
    .label { font-size: 10px; fill: #333; }
    .pin { font-size: 9px; fill: #0066cc; font-weight: bold; }
    .title { font-size: 16px; fill: #000; font-weight: bold; }
    .subtitle { font-size: 11px; fill: #555; }
    .node { fill: #222; }
    .led-fill { fill: #ff4444; stroke: #222; stroke-width: 1.2; }
    .gnd { stroke: #222; stroke-width: 1.5; }
    .vcc { fill: #cc0000; font-size: 10px; font-weight: bold; }
    .box { fill: #f0f4ff; stroke: #4477bb; stroke-width: 2; rx: 6; }
    .section { font-size: 12px; fill: #4477bb; font-weight: bold; }
  </style>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="title">Cub LED 3x3x3 — ESP32 (MicroPython) — Schema electrică</text>
  <text x="600" y="48" text-anchor="middle" class="subtitle">9 coloane (anoduri) × 3 straturi (catoduri) cu multiplexare POV</text>

  <!-- ESP32 Box -->
  <rect x="20" y="70" width="130" height="440" class="box"/>
  <text x="85" y="90" text-anchor="middle" class="section">ESP32</text>
  <text x="85" y="104" text-anchor="middle" class="section">DevKit</text>

  <!-- ESP32 Column pins -->
  <text x="135" y="140" class="pin" text-anchor="end">GPIO 2</text>
  <text x="135" y="170" class="pin" text-anchor="end">GPIO 4</text>
  <text x="135" y="200" class="pin" text-anchor="end">GPIO 5</text>
  <text x="135" y="230" class="pin" text-anchor="end">GPIO 18</text>
  <text x="135" y="260" class="pin" text-anchor="end">GPIO 19</text>
  <text x="135" y="290" class="pin" text-anchor="end">GPIO 21</text>
  <text x="135" y="320" class="pin" text-anchor="end">GPIO 22</text>
  <text x="135" y="350" class="pin" text-anchor="end">GPIO 23</text>
  <text x="135" y="380" class="pin" text-anchor="end">GPIO 25</text>

  <!-- ESP32 Layer pins -->
  <text x="135" y="430" class="pin" text-anchor="end">GPIO 26</text>
  <text x="135" y="460" class="pin" text-anchor="end">GPIO 27</text>
  <text x="135" y="490" class="pin" text-anchor="end">GPIO 32</text>

  <!-- Wires from ESP32 to resistors (columns) -->
  <line x1="150" y1="137" x2="200" y2="137" class="wire"/>
  <line x1="150" y1="167" x2="200" y2="167" class="wire"/>
  <line x1="150" y1="197" x2="200" y2="197" class="wire"/>
  <line x1="150" y1="227" x2="200" y2="227" class="wire"/>
  <line x1="150" y1="257" x2="200" y2="257" class="wire"/>
  <line x1="150" y1="287" x2="200" y2="287" class="wire"/>
  <line x1="150" y1="317" x2="200" y2="317" class="wire"/>
  <line x1="150" y1="347" x2="200" y2="347" class="wire"/>
  <line x1="150" y1="377" x2="200" y2="377" class="wire"/>

  <!-- 220Ω Resistors (zigzag symbol) for columns -->
  <!-- Resistor macro: zigzag from x=200 to x=270 -->
  <g id="r220">
    <polyline points="0,0 5,0 10,-6 20,6 30,-6 40,6 50,-6 60,6 65,0 70,0" class="comp"/>
  </g>

  <use href="#r220" x="200" y="137"/>
  <use href="#r220" x="200" y="167"/>
  <use href="#r220" x="200" y="197"/>
  <use href="#r220" x="200" y="227"/>
  <use href="#r220" x="200" y="257"/>
  <use href="#r220" x="200" y="287"/>
  <use href="#r220" x="200" y="317"/>
  <use href="#r220" x="200" y="347"/>
  <use href="#r220" x="200" y="377"/>

  <!-- Resistor labels -->
  <text x="235" y="130" class="label" text-anchor="middle">220Ω</text>
  <text x="235" y="160" class="label" text-anchor="middle">220Ω</text>
  <text x="235" y="190" class="label" text-anchor="middle">220Ω</text>
  <text x="235" y="220" class="label" text-anchor="middle">220Ω</text>
  <text x="235" y="250" class="label" text-anchor="middle">220Ω</text>
  <text x="235" y="280" class="label" text-anchor="middle">220Ω</text>
  <text x="235" y="310" class="label" text-anchor="middle">220Ω</text>
  <text x="235" y="340" class="label" text-anchor="middle">220Ω</text>
  <text x="235" y="370" class="label" text-anchor="middle">220Ω</text>

  <!-- Wires from resistors to LED columns -->
  <line x1="270" y1="137" x2="340" y2="137" class="wire"/>
  <line x1="270" y1="167" x2="340" y2="167" class="wire"/>
  <line x1="270" y1="197" x2="340" y2="197" class="wire"/>
  <line x1="270" y1="227" x2="340" y2="227" class="wire"/>
  <line x1="270" y1="257" x2="340" y2="257" class="wire"/>
  <line x1="270" y1="287" x2="340" y2="287" class="wire"/>
  <line x1="270" y1="317" x2="340" y2="317" class="wire"/>
  <line x1="270" y1="347" x2="340" y2="347" class="wire"/>
  <line x1="270" y1="377" x2="340" y2="377" class="wire"/>

  <!-- Column labels -->
  <text x="310" y="130" class="label" text-anchor="middle">C0</text>
  <text x="310" y="160" class="label" text-anchor="middle">C1</text>
  <text x="310" y="190" class="label" text-anchor="middle">C2</text>
  <text x="310" y="220" class="label" text-anchor="middle">C3</text>
  <text x="310" y="250" class="label" text-anchor="middle">C4</text>
  <text x="310" y="280" class="label" text-anchor="middle">C5</text>
  <text x="310" y="310" class="label" text-anchor="middle">C6</text>
  <text x="310" y="340" class="label" text-anchor="middle">C7</text>
  <text x="310" y="370" class="label" text-anchor="middle">C8</text>

  <!-- ============ LED CUBE SECTION ============ -->
  <!-- LED symbol (triangle + line) -->
  <g id="led">
    <polygon points="0,-5 0,5 10,0" class="led-fill"/>
    <line x1="10" y1="-5" x2="10" y2="5" class="comp"/>
    <!-- arrows (light emission) -->
    <line x1="6" y1="-8" x2="10" y2="-12" class="comp" stroke-width="0.8"/>
    <polyline points="8,-12 10,-12 10,-10" class="comp" stroke-width="0.8"/>
    <line x1="9" y1="-6" x2="13" y2="-10" class="comp" stroke-width="0.8"/>
    <polyline points="11,-10 13,-10 13,-8" class="comp" stroke-width="0.8"/>
  </g>

  <!-- Layer 2 (top) - 9 LEDs at y=137..377, x=340..370 -->
  <!-- Each column wire goes through 3 LEDs (one per layer) -->
  <!-- LED anodes connect to column wires, cathodes connect horizontally to layer bus -->

  <!-- LAYER 2 (superior) -->
  <rect x="335" y="65" width="250" height="50" fill="none" stroke="#44aa44" stroke-width="1" stroke-dasharray="5,3" rx="4"/>
  <text x="460" y="80" text-anchor="middle" class="section" fill="#44aa44">Stratul 2 (superior)</text>

  <!-- LEDs Layer 2: 3 LEDs for columns 0,1,2 -->
  <use href="#led" x="340" y="97"/>
  <line x1="350" y1="97" x2="380" y2="97" class="wire"/>
  <use href="#led" x="400" y="97"/>
  <line x1="410" y1="97" x2="440" y2="97" class="wire"/>
  <use href="#led" x="460" y="97"/>
  <line x1="470" y1="97" x2="500" y2="97" class="wire"/>

  <!-- Vertical wires from column bus down to Layer 2 LEDs (C0, C1, C2) -->
  <line x1="340" y1="137" x2="340" y2="97" class="wire"/>
  <line x1="400" y1="167" x2="400" y2="97" class="wire"/>
  <line x1="460" y1="197" x2="460" y2="97" class="wire"/>

  <!-- Layer 2 cathode bus (horizontal) -->
  <line x1="380" y1="97" x2="400" y2="97" class="wire"/>
  <line x1="440" y1="97" x2="460" y2="97" class="wire"/>
  <line x1="500" y1="97" x2="590" y2="97" class="wire"/>

  <!-- LAYER 1 (mijlociu) -->
  <rect x="335" y="140" width="310" height="50" fill="none" stroke="#4488cc" stroke-width="1" stroke-dasharray="5,3" rx="4"/>
  <text x="490" y="155" text-anchor="middle" class="section" fill="#4488cc">Stratul 1 (mijlociu)</text>

  <!-- LEDs Layer 1: columns 3,4,5 -->
  <use href="#led" x="340" y="172"/>
  <line x1="350" y1="172" x2="440" y2="172" class="wire"/>
  <use href="#led" x="460" y="172"/>
  <line x1="470" y1="172" x2="500" y2="172" class="wire"/>
  <use href="#led" x="520" y="172"/>
  <line x1="530" y1="172" x2="560" y2="172" class="wire"/>

  <!-- Vertical wires -->
  <line x1="340" y1="227" x2="340" y2="172" class="wire"/>
  <line x1="460" y1="257" x2="460" y2="172" class="wire"/>
  <line x1="520" y1="287" x2="520" y2="172" class="wire"/>

  <!-- Layer 1 cathode bus -->
  <line x1="500" y1="172" x2="520" y2="172" class="wire"/>
  <line x1="560" y1="172" x2="650" y2="172" class="wire"/>

  <!-- LAYER 0 (inferior) -->
  <rect x="335" y="215" width="370" height="50" fill="none" stroke="#cc8844" stroke-width="1" stroke-dasharray="5,3" rx="4"/>
  <text x="520" y="230" text-anchor="middle" class="section" fill="#cc8844">Stratul 0 (inferior)</text>

  <!-- LEDs Layer 0: columns 6,7,8 -->
  <use href="#led" x="340" y="247"/>
  <line x1="350" y1="247" x2="500" y2="247" class="wire"/>
  <use href="#led" x="520" y="247"/>
  <line x1="530" y1="247" x2="560" y2="247" class="wire"/>
  <use href="#led" x="580" y="247"/>
  <line x1="590" y1="247" x2="620" y2="247" class="wire"/>

  <!-- Vertical wires -->
  <line x1="340" y1="317" x2="340" y2="247" class="wire"/>
  <line x1="520" y1="347" x2="520" y2="247" class="wire"/>
  <line x1="580" y1="377" x2="580" y2="247" class="wire"/>

  <!-- Layer 0 cathode bus -->
  <line x1="560" y1="247" x2="580" y2="247" class="wire"/>
  <line x1="620" y1="247" x2="710" y2="247" class="wire"/>

  <!-- ============ TRANSISTOR SECTION ============ -->
  <!-- NPN Transistor symbol -->
  <g id="npn">
    <!-- Base line -->
    <line x1="0" y1="0" x2="12" y2="0" class="comp"/>
    <!-- Vertical bar -->
    <line x1="12" y1="-12" x2="12" y2="12" class="comp" stroke-width="2.5"/>
    <!-- Collector -->
    <line x1="12" y1="-7" x2="28" y2="-18" class="comp"/>
    <!-- Emitter with arrow -->
    <line x1="12" y1="7" x2="28" y2="18" class="comp"/>
    <polygon points="28,18 22,12 24,18" fill="#222"/>
  </g>

  <!-- 1kΩ Resistors for transistor bases -->
  <g id="r1k">
    <polyline points="0,0 5,0 10,-5 18,5 26,-5 34,5 42,-5 50,5 55,0 60,0" class="comp"/>
  </g>

  <!-- Transistor T2 (Layer 2) -->
  <text x="620" y="62" class="label" text-anchor="middle">Layer 2</text>
  <line x1="590" y1="97" x2="590" y2="70" class="wire"/>
  <line x1="590" y1="70" x2="660" y2="70" class="wire"/>
  <use href="#r1k" x="660" y="70"/>
  <line x1="720" y1="70" x2="740" y2="70" class="wire"/>
  <use href="#npn" x="740" y="70"/>
  <text x="780" y="62" class="label">Q3</text>
  <text x="780" y="74" class="label">2N2222</text>
  <!-- Collector to layer bus -->
  <line x1="768" y1="52" x2="768" y2="40" class="wire"/>
  <text x="768" y="36" class="pin" text-anchor="middle">GPIO 32</text>
  <!-- Emitter to GND -->
  <line x1="768" y1="88" x2="768" y2="100" class="wire"/>

  <!-- Transistor T1 (Layer 1) -->
  <text x="680" y="140" class="label" text-anchor="middle">Layer 1</text>
  <line x1="650" y1="172" x2="650" y2="150" class="wire"/>
  <line x1="650" y1="150" x2="720" y2="150" class="wire"/>
  <use href="#r1k" x="720" y="150"/>
  <line x1="780" y1="150" x2="800" y2="150" class="wire"/>
  <use href="#npn" x="800" y="150"/>
  <text x="840" y="142" class="label">Q2</text>
  <text x="840" y="154" class="label">2N2222</text>
  <line x1="828" y1="132" x2="828" y2="120" class="wire"/>
  <text x="828" y="116" class="pin" text-anchor="middle">GPIO 27</text>
  <line x1="828" y1="168" x2="828" y2="180" class="wire"/>

  <!-- Transistor T0 (Layer 0) -->
  <text x="740" y="215" class="label" text-anchor="middle">Layer 0</text>
  <line x1="710" y1="247" x2="710" y2="225" class="wire"/>
  <line x1="710" y1="225" x2="780" y2="225" class="wire"/>
  <use href="#r1k" x="780" y="225"/>
  <line x1="840" y1="225" x2="860" y2="225" class="wire"/>
  <use href="#npn" x="860" y="225"/>
  <text x="900" y="217" class="label">Q1</text>
  <text x="900" y="229" class="label">2N2222</text>
  <line x1="888" y1="207" x2="888" y2="195" class="wire"/>
  <text x="888" y="191" class="pin" text-anchor="middle">GPIO 26</text>
  <line x1="888" y1="243" x2="888" y2="255" class="wire"/>

  <!-- 1kΩ labels -->
  <text x="690" y="62" class="label" text-anchor="middle">1kΩ</text>
  <text x="750" y="142" class="label" text-anchor="middle">1kΩ</text>
  <text x="810" y="217" class="label" text-anchor="middle">1kΩ</text>

  <!-- GND symbols -->
  <g id="gnd">
    <line x1="0" y1="0" x2="0" y2="6" class="gnd"/>
    <line x1="-8" y1="6" x2="8" y2="6" class="gnd"/>
    <line x1="-5" y1="10" x2="5" y2="10" class="gnd"/>
    <line x1="-2" y1="14" x2="2" y2="14" class="gnd"/>
  </g>

  <use href="#gnd" x="768" y="100"/>
  <use href="#gnd" x="828" y="180"/>
  <use href="#gnd" x="888" y="255"/>

  <!-- GND labels -->
  <text x="768" y="122" class="label" text-anchor="middle">GND</text>
  <text x="828" y="202" class="label" text-anchor="middle">GND</text>
  <text x="888" y="277" class="label" text-anchor="middle">GND</text>

  <!-- Junction dots -->
  <circle cx="340" cy="137" r="2.5" class="node"/>
  <circle cx="400" cy="167" r="2.5" class="node"/>
  <circle cx="460" cy="197" r="2.5" class="node"/>
  <circle cx="340" cy="227" r="2.5" class="node"/>
  <circle cx="460" cy="257" r="2.5" class="node"/>
  <circle cx="520" cy="287" r="2.5" class="node"/>
  <circle cx="340" cy="317" r="2.5" class="node"/>
  <circle cx="520" cy="347" r="2.5" class="node"/>
  <circle cx="580" cy="377" r="2.5" class="node"/>

  <!-- ============ CUBE 3D DIAGRAM ============ -->
  <rect x="335" y="420" width="400" height="260" fill="#fafafa" stroke="#ccc" stroke-width="1" rx="8"/>
  <text x="535" y="445" text-anchor="middle" class="section">Structura cubului 3x3x3 — vedere de sus</text>

  <!-- 3x3 grid showing column layout -->
  <g transform="translate(410, 480)">
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="200" y2="0" stroke="#ddd" stroke-width="0.5"/>
    <line x1="0" y1="70" x2="200" y2="70" stroke="#ddd" stroke-width="0.5"/>
    <line x1="0" y1="140" x2="200" y2="140" stroke="#ddd" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="0" y2="140" stroke="#ddd" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="140" stroke="#ddd" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="140" stroke="#ddd" stroke-width="0.5"/>

    <!-- LED circles with labels -->
    <circle cx="30" cy="30" r="14" fill="#ff6666" stroke="#cc0000" stroke-width="1.5"/>
    <text x="30" y="34" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C0</text>
    <text x="30" y="58" text-anchor="middle" class="pin">GPIO2</text>

    <circle cx="100" cy="30" r="14" fill="#ff6666" stroke="#cc0000" stroke-width="1.5"/>
    <text x="100" y="34" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C1</text>
    <text x="100" y="58" text-anchor="middle" class="pin">GPIO4</text>

    <circle cx="170" cy="30" r="14" fill="#ff6666" stroke="#cc0000" stroke-width="1.5"/>
    <text x="170" y="34" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C2</text>
    <text x="170" y="58" text-anchor="middle" class="pin">GPIO5</text>

    <circle cx="30" cy="100" r="14" fill="#66bb66" stroke="#339933" stroke-width="1.5"/>
    <text x="30" y="104" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C3</text>
    <text x="30" y="128" text-anchor="middle" class="pin">GPIO18</text>

    <circle cx="100" cy="100" r="14" fill="#66bb66" stroke="#339933" stroke-width="1.5"/>
    <text x="100" y="104" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C4</text>
    <text x="100" y="128" text-anchor="middle" class="pin">GPIO19</text>

    <circle cx="170" cy="100" r="14" fill="#66bb66" stroke="#339933" stroke-width="1.5"/>
    <text x="170" y="104" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C5</text>
    <text x="170" y="128" text-anchor="middle" class="pin">GPIO21</text>

    <circle cx="30" cy="170" r="14" fill="#6688dd" stroke="#3355aa" stroke-width="1.5"/>
    <text x="30" y="174" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C6</text>
    <text x="30" y="198" text-anchor="middle" class="pin">GPIO22</text>

    <circle cx="100" cy="170" r="14" fill="#6688dd" stroke="#3355aa" stroke-width="1.5"/>
    <text x="100" y="174" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C7</text>
    <text x="100" y="198" text-anchor="middle" class="pin">GPIO23</text>

    <circle cx="170" cy="170" r="14" fill="#6688dd" stroke="#3355aa" stroke-width="1.5"/>
    <text x="170" y="174" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C8</text>
    <text x="170" y="198" text-anchor="middle" class="pin">GPIO25</text>
  </g>

  <!-- Layer labels next to cube diagram -->
  <g transform="translate(640, 510)">
    <rect x="0" y="0" width="80" height="20" fill="#44aa44" rx="3" opacity="0.2"/>
    <text x="40" y="14" text-anchor="middle" font-size="10" fill="#44aa44" font-weight="bold">Strat 2 (GPIO32)</text>
    <rect x="0" y="30" width="80" height="20" fill="#4488cc" rx="3" opacity="0.2"/>
    <text x="40" y="44" text-anchor="middle" font-size="10" fill="#4488cc" font-weight="bold">Strat 1 (GPIO27)</text>
    <rect x="0" y="60" width="80" height="20" fill="#cc8844" rx="3" opacity="0.2"/>
    <text x="40" y="74" text-anchor="middle" font-size="10" fill="#cc8844" font-weight="bold">Strat 0 (GPIO26)</text>
  </g>

  <!-- Notes -->
  <text x="20" y="720" class="subtitle">Notă: Toți pinii GPIO au fost aleși pentru a evita pinii de boot-strapping (GPIO 0, 12, 15) și pinii doar-intrare (GPIO 34, 35, 36, 39).</text>
  <text x="20" y="740" class="subtitle">Tensiune logică: 3.3V | Anodurile (+) → prin 220Ω → GPIO | Catodurile (−) → prin 2N2222 (bază 1kΩ) → GND</text>
</svg>
